    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>礼花式MCTS可视化</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
        }
        
        #container {

            align-items: center;
            min-height: 80vh;
            flex-direction: column;
        }
        
        canvas {
            border: 1px solid #333;

        canvas:active {

        button {
            background: #2c5530;

        button:hover {

            font-size: 14px;

    </style>
<script src="https://puc.poecdn.net/authenticated_preview_page/syncedState.bd4eeeb8e8e02052ee92.js"></script></head>
<body>
    <div id="container">
        <h1>礼花式MCTS可视化</h1>
        <canvas id="mctsCanvas" width="800" height="600"></canvas>
        
        <div class="controls">
            <button onclick="mctsViz.reset()">重置</button>
            <button onclick="mctsViz.toggleAnimation()">暂停/播放</button>
            <button onclick="mctsViz.speedUp()">加速</button>
            <button onclick="mctsViz.slowDown()">减速</button>
        </div>
        
        <div class="info">
            <div id="nodeCount">节点数: 1</div>
            <div id="layerInfo">最大深度: 0</div>
            <div id="expandingNode">正在扩展: 根节点</div>
            <div>拖拽鼠标旋转视角 | 滚轮缩放</div>
        </div>
    </div>

    <script>
        class Vector3 {
            constructor(x = 0, y = 0, z = 0) {
                this.x = x;
                this.y = y;
                this.z = z;
            }
            
            length() {
                return Math.sqrt(this.x * this.x + this.y * this.y + this.z * this.z);
            }
            
            normalize() {
                const len = this.length();
                if (len > 0) {
                    this.x /= len;
                    this.y /= len;
                    this.z /= len;
                }
                return this;
            }
            
            add(v) {
                return new Vector3(this.x + v.x, this.y + v.y, this.z + v.z);
            }
            
            subtract(v) {
                return new Vector3(this.x - v.x, this.y - v.y, this.z - v.z);
            }
            
            multiply(scalar) {
                return new Vector3(this.x * scalar, this.y * scalar, this.z * scalar);
            }
            
            cross(v) {
                return new Vector3(
                    this.y * v.z - this.z * v.y,
                    this.z * v.x - this.x * v.z,
                    this.x * v.y - this.y * v.x
                );
            }
            
            dot(v) {
                return this.x * v.x + this.y * v.y + this.z * v.z;
            }
        }

        class MCTSNode {
            constructor(position, parent = null, radius = 1) {
                this.position = position;
                this.radius = radius;
                this.parent = parent;
                this.children = [];
                this.visits = 0;
                this.value = 0;
                this.depth = parent ? parent.depth + 1 : 0;
                this.creationTime = Date.now();
                this.isExpanded = false;
                this.isExpanding = false;
                this.expandStartTime = 0;
            }
            
            addChild(child) {
                this.children.push(child);
                child.parent = this;
            }
            
            isLeaf() {
                return this.children.length === 0;
            }
        }

        class FireworksMCTSVisualizer {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.width = this.canvas.width;
                this.height = this.canvas.height;
                this.centerX = this.width / 2;
                this.centerY = this.height / 2;
                
                // 相机参数
                this.camera = {
                    distance: 8,
                    rotationX: 0.2,
                    rotationY: 0,
                    fov: 400
                };
                
                // 同心球参数
                this.baseRadius = 0.6;
                this.radiusIncrement = 1.2;
                this.maxDepth = 6;
                
                // 散布控制参数 - 新增！
                this.baseSpreadRadius = 0.3; // 基础散布半径（绝对距离）
                this.spreadGrowthFactor = 0.08; // 每层散布半径的增长系数
                
                // MCTS参数
                this.root = new MCTSNode(new Vector3(0, 0, this.baseRadius), null, this.baseRadius);
                this.nodes = [this.root];
                this.maxNodes = 300;
                this.maxDepthReached = 0;
                
                // 动画参数
                this.isAnimating = true;
                this.animationSpeed = 1;
                this.lastTime = 0;
                this.stepInterval = 1500;
                this.currentExpandingNode = null;
                
                // 交互参数
                this.isDragging = false;
                this.lastMouseX = 0;
                this.lastMouseY = 0;
                
                this.setupEventListeners();
                this.animate();
            }
            
            setupEventListeners() {
                this.canvas.addEventListener('mousedown', (e) => {
                    this.isDragging = true;
                    this.lastMouseX = e.clientX;
                    this.lastMouseY = e.clientY;
                });
                
                this.canvas.addEventListener('mousemove', (e) => {
                    if (this.isDragging) {
                        const deltaX = e.clientX - this.lastMouseX;
                        const deltaY = e.clientY - this.lastMouseY;
                        
                        this.camera.rotationY += deltaX * 0.01;
                        this.camera.rotationX += deltaY * 0.01;
                        
                        this.camera.rotationX = Math.max(-Math.PI/2, Math.min(Math.PI/2, this.camera.rotationX));
                        
                        this.lastMouseX = e.clientX;
                        this.lastMouseY = e.clientY;
                    }
                });
                
                this.canvas.addEventListener('mouseup', () => {
                    this.isDragging = false;
                });
                
                this.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    this.camera.distance += e.deltaY * 0.02;
                    this.camera.distance = Math.max(4, Math.min(16, this.camera.distance));
                });
            }
            
            getRadiusForDepth(depth) {
                return this.baseRadius + (depth * this.radiusIncrement);
            }
            
            // 计算给定深度的散布半径
            getSpreadRadiusForDepth(depth) {
                return this.baseSpreadRadius + (depth * this.spreadGrowthFactor);
            }
            
            // 根据散布半径和球面半径计算伞状角度
            calculateUmbrellaAngle(spreadRadius, sphereRadius) {
                // 使用反正弦函数：spreadRadius = sin(angle) * sphereRadius
                // 所以 angle = asin(spreadRadius / sphereRadius)
                const ratio = Math.min(spreadRadius / sphereRadius, 0.9); // 限制最大值避免数值错误
                return Math.asin(ratio);
            }
            
            selectNodeToExpand() {
                if (this.nodes.length >= this.maxNodes) return null;
                
                const leafNodes = this.nodes.filter(node => 
                    node.isLeaf() && 
                    !node.isExpanded && 
                    node.depth < this.maxDepth
                );
                
                if (leafNodes.length === 0) return null;
                
                return leafNodes[Math.floor(Math.random() * leafNodes.length)];
            }
            
            expandNode(node) {
                if (node.isExpanded || node.depth >= this.maxDepth) return;
                
                node.isExpanded = true;
                node.isExpanding = true;
                node.expandStartTime = Date.now();
                this.currentExpandingNode = node;
                
                let numChildren;
                if (node.depth === 0) {
                    numChildren = 12 + Math.floor(Math.random() * 5); // 12-16个子节点
                } else if (node.depth < 3) {
                    numChildren = 10 + Math.floor(Math.random() * 5); // 10-14个子节点
                } else if (node.depth < 5) {
                    numChildren = 10 + Math.floor(Math.random() * 3); // 10-12个子节点
                } else {
                    numChildren = 10 + Math.floor(Math.random() * 2); // 10-11个子节点
                }
                
                const childRadius = this.getRadiusForDepth(node.depth + 1);
                this.maxDepthReached = Math.max(this.maxDepthReached, node.depth + 1);
                
                // 使用新的散布半径计算方法
                const targetSpreadRadius = this.getSpreadRadiusForDepth(node.depth + 1);
                const umbrellaAngle = this.calculateUmbrellaAngle(targetSpreadRadius, childRadius);
                
                for (let i = 0; i < numChildren && this.nodes.length < this.maxNodes; i++) {
                    const childPos = this.generateUmbrellaChild(node, i, numChildren, umbrellaAngle, childRadius);
                    const child = new MCTSNode(childPos, node, childRadius);
                    node.addChild(child);
                    this.nodes.push(child);
                }
                
                setTimeout(() => {
                    node.isExpanding = false;
                    if (this.currentExpandingNode === node) {
                        this.currentExpandingNode = null;
                    }
                }, 800);
            }
            
            generateUmbrellaChild(parent, childIndex, totalChildren, umbrellaAngle, targetRadius) {
                const parentDirection = new Vector3(parent.position.x, parent.position.y, parent.position.z).normalize();
                
                let up = new Vector3(0, 0, 1);
                if (Math.abs(parentDirection.dot(up)) > 0.9) {
                    up = new Vector3(1, 0, 0);
                }
                
                const right = parentDirection.cross(up).normalize();
                const forward = parentDirection.cross(right).normalize();
                
                const angleAroundParent = (childIndex / totalChildren) * Math.PI * 2;
                
                // 减少径向变化以保持更一致的散布
                const radiusVariation = 0.9 + (Math.random() * 0.2); // 从0.8-1.2改为0.9-1.1
                const radiusInPlane = Math.sin(umbrellaAngle) * radiusVariation;
                
                const localX = Math.cos(angleAroundParent) * radiusInPlane;
                const localY = Math.sin(angleAroundParent) * radiusInPlane;
                const localZ = Math.cos(umbrellaAngle);
                
                const worldDirection = right.multiply(localX)
                    .add(forward.multiply(localY))
                    .add(parentDirection.multiply(localZ))
                    .normalize();
                
                // 减少随机偏移
                const randomOffset = 0.03; // 从0.05减小到0.03
                const randomDir = new Vector3(
                    (Math.random() - 0.5) * randomOffset,
                    (Math.random() - 0.5) * randomOffset,
                    (Math.random() - 0.5) * randomOffset
                );
                
                const finalDirection = worldDirection.add(randomDir).normalize();
                return finalDirection.multiply(targetRadius);
            }
            
            simulateStep() {
                const selectedNode = this.selectNodeToExpand();
                if (selectedNode) {
                    this.expandNode(selectedNode);
                }
            }
            
            project3D(point) {
                let x = point.x;
                let y = point.y;
                let z = point.z;
                
                const cosY = Math.cos(this.camera.rotationY);
                const sinY = Math.sin(this.camera.rotationY);
                const tempX = x * cosY - z * sinY;
                z = x * sinY + z * cosY;
                x = tempX;
                
                const cosX = Math.cos(this.camera.rotationX);
                const sinX = Math.sin(this.camera.rotationX);
                const tempY = y * cosX - z * sinX;
                z = y * sinX + z * cosX;
                y = tempY;
                
                z += this.camera.distance;
                if (z <= 0) z = 0.1;
                
                const screenX = this.centerX + (x * this.camera.fov) / z;
                const screenY = this.centerY + (y * this.camera.fov) / z;
                
                return { x: screenX, y: screenY, z: z };
            }
            
            drawConcentricSpheres() {
                for (let depth = 0; depth <= this.maxDepthReached; depth++) {
                    const radius = this.getRadiusForDepth(depth);
                    const alpha = Math.max(0.02, 0.12 - depth * 0.015);
                    
                    this.ctx.strokeStyle = `rgba(0, 120, 80, ${alpha})`;
                    this.ctx.lineWidth = 0.3;
                    
                    const segments = 16;
                    
                    for (let i = 0; i < segments; i++) {
                        const theta = (i / segments) * Math.PI * 2;
                        this.ctx.beginPath();
                        let firstPoint = true;
                        
                        for (let j = 0; j <= segments; j++) {
                            const phi = (j / segments) * Math.PI;
                            const point3D = this.sphericalToCartesian(theta, phi, radius);
                            const point2D = this.project3D(point3D);
                            
                            if (firstPoint) {
                                this.ctx.moveTo(point2D.x, point2D.y);
                                firstPoint = false;
                            } else {
                                this.ctx.lineTo(point2D.x, point2D.y);
                            }
                        }
                        this.ctx.stroke();
                    }
                    
                    for (let i = 1; i < segments; i++) {
                        const phi = (i / segments) * Math.PI;
                        this.ctx.beginPath();
                        let firstPoint = true;
                        
                        for (let j = 0; j <= segments * 2; j++) {
                            const theta = (j / (segments * 2)) * Math.PI * 2;
                            const point3D = this.sphericalToCartesian(theta, phi, radius);
                            const point2D = this.project3D(point3D);
                            
                            if (firstPoint) {
                                this.ctx.moveTo(point2D.x, point2D.y);
                                firstPoint = false;
                            } else {
                                this.ctx.lineTo(point2D.x, point2D.y);
                            }
                        }
                        this.ctx.stroke();
                    }
                }
            }
            
            sphericalToCartesian(theta, phi, r) {
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);
                return new Vector3(x, y, z);
            }
            
            drawNodes() {
                const projectedNodes = this.nodes.map(node => ({
                    node: node,
                    projected: this.project3D(node.position)
                })).sort((a, b) => b.projected.z - a.projected.z);
                
                projectedNodes.forEach(({ node, projected }) => {
                    if (projected.z <= 0) return;
                    
                    if (node.parent) {
                        const parentPos = this.project3D(node.parent.position);
                        if (parentPos.z > 0) {
                            this.ctx.strokeStyle = 'rgba(0, 255, 150, 0.7)';
                            this.ctx.lineWidth = 1.5;
                            this.ctx.beginPath();
                            this.ctx.moveTo(parentPos.x, parentPos.y);
                            this.ctx.lineTo(projected.x, projected.y);
                            this.ctx.stroke();
                        }
                    }
                    
                    const age = Date.now() - node.creationTime;
                    const maxAge = 20000;
                    const ageRatio = Math.min(age / maxAge, 1);
                    
                    let baseSize = Math.max(2.5 - node.depth * 0.15, 1.2);
                    
                    if (node.isExpanding) {
                        const expandTime = Date.now() - node.expandStartTime;
                        const pulsePhase = (expandTime % 400) / 400;
                        baseSize *= (1.5 + Math.sin(pulsePhase * Math.PI * 2) * 0.5);
                    }
                    
                    const size = baseSize * (1 / projected.z) * 12;
                    const alpha = Math.max(0.7, 1 - ageRatio * 0.3);
                    
                    const depthRatio = Math.min(node.depth / 6, 1);
                    let hue = 140 - (depthRatio * 80);
                    
                    if (node.isExpanding) {
                        hue = 30;
                    }
                    
                    const saturation = 80 + (depthRatio * 20);
                    const lightness = 50 + (depthRatio * 30);
                    
                    this.ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
                    
                    this.ctx.beginPath();
                    this.ctx.arc(projected.x, projected.y, size, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    if (size > 2) {
                        this.ctx.strokeStyle = `hsla(${hue}, ${saturation}%, ${lightness + 15}%, ${alpha})`;
                        this.ctx.lineWidth = 0.8;
                        this.ctx.stroke();
                    }
                });
            }
            
            render() {
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                this.ctx.fillRect(0, 0, this.width, this.height);
                
                this.drawConcentricSpheres();
                this.drawNodes();
                
                document.getElementById('nodeCount').textContent = `节点数: ${this.nodes.length}`;
                document.getElementById('layerInfo').textContent = `最大深度: ${this.maxDepthReached}`;
                
                if (this.currentExpandingNode) {
                    document.getElementById('expandingNode').textContent = 
                        `正在扩展: 深度${this.currentExpandingNode.depth}节点 (${this.currentExpandingNode.children.length}个子节点)`;
                } else {
                    document.getElementById('expandingNode').textContent = `等待下一次扩展...`;
                }
            }
            
            animate(currentTime = 0) {
                if (this.isAnimating && currentTime - this.lastTime > this.stepInterval / this.animationSpeed) {
                    this.simulateStep();
                    this.lastTime = currentTime;
                }
                
                if (this.isAnimating && !this.isDragging) {
                    this.camera.rotationY += 0.004;
                }
                
                this.render();
                requestAnimationFrame((time) => this.animate(time));
            }
            
            reset() {
                this.root = new MCTSNode(new Vector3(0, 0, this.baseRadius), null, this.baseRadius);
                this.nodes = [this.root];
                this.maxDepthReached = 0;
                this.currentExpandingNode = null;
            }
            
            toggleAnimation() {
                this.isAnimating = !this.isAnimating;
            }
            
            speedUp() {
                this.animationSpeed = Math.min(this.animationSpeed * 1.5, 10);
            }
            
            slowDown() {
                this.animationSpeed = Math.max(this.animationSpeed / 1.5, 0.1);
            }
        }

        const mctsViz = new FireworksMCTSVisualizer('mctsCanvas');
    </script>
