    <style>

<script src="https://puc.poecdn.net/authenticated_preview_page/syncedState.bd4eeeb8e8e02052ee92.js"></script></head>
<body>
    <div id="container">
        <h1>⭐ 仰望星空 - MCTS可视化</h1>
        <canvas id="mctsCanvas" width="800" height="600"></canvas>
        
        <div class="controls">
            <button onclick="mctsViz.reset()">重置</button>
            <button onclick="mctsViz.toggleAnimation()">暂停/播放</button>
            <button onclick="mctsViz.speedUp()">加速</button>
            <button onclick="mctsViz.slowDown()">减速</button>
        </div>
        
        <div class="info">
            <div id="nodeCount">节点数: 1</div>
            <div id="layerInfo">最大深度: 0</div>
            <div id="expandingNode">正在扩展: 根节点</div>
            <div style="margin-top: 10px;">
                <span style="color: #ff8c00;">⭐</span> 中心节点（已扩展） 
                <span style="color: #90ee90; margin-left: 15px;">✨</span> 叶子节点
                <span style="color: #ffff00; margin-left: 15px;">🌟</span> 深层节点
            </div>
            <div>拖拽鼠标改变仰望方向 | 滚轮调整视野范围</div>
        </div>
    </div>

    <script>
        class Vector3 {
            constructor(x = 0, y = 0, z = 0) {
                this.x = x;
                this.y = y;
                this.z = z;
            }
            
            length() {
                return Math.sqrt(this.x * this.x + this.y * this.y + this.z * this.z);
            }
            
            normalize() {
                const len = this.length();
                if (len > 0) {
                    this.x /= len;
                    this.y /= len;
                    this.z /= len;
                }
                return this;
            }
            
            add(v) {
                return new Vector3(this.x + v.x, this.y + v.y, this.z + v.z);
            }
            
            subtract(v) {
                return new Vector3(this.x - v.x, this.y - v.y, this.z - v.z);
            }
            
            multiply(scalar) {
                return new Vector3(this.x * scalar, this.y * scalar, this.z * scalar);
            }
            
            cross(v) {
                return new Vector3(
                    this.y * v.z - this.z * v.y,
                    this.z * v.x - this.x * v.z,
                    this.x * v.y - this.y * v.x
                );
            }
            
            dot(v) {
                return this.x * v.x + this.y * v.y + this.z * v.z;
            }
        }

        class MCTSNode {
            constructor(position, parent = null, radius = 1) {
                this.position = position;
                this.radius = radius;
                this.parent = parent;
                this.children = [];
                this.visits = 0;
                this.value = 0;
                this.depth = parent ? parent.depth + 1 : 0;
                this.creationTime = Date.now();
                this.isExpanded = false;
                this.isExpanding = false;
                this.expandStartTime = 0;
            }
            
            addChild(child) {
                this.children.push(child);
                child.parent = this;
            }
            
            isLeaf() {
                return this.children.length === 0;
            }
        }

        class StargazingMCTSVisualizer {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.width = this.canvas.width;
                this.height = this.canvas.height;
                this.centerX = this.width / 2;
                this.centerY = this.height / 2;
                
                // 相机参数
                this.camera = {
                    position: new Vector3(0, 0, 0),
                    rotationX: 0.3,
                    rotationY: 0,
                    fov: 500,
                    nearClip: 0.1,
                    farClip: 15
                };
                
                // 同心球参数
                this.baseRadius = 0.8;
                this.radiusIncrement = 1.0;
                this.maxDepth = 6;
                
                // 散布控制参数
                this.baseSpreadRadius = 0.4;
                this.spreadGrowthFactor = 0.06;
                
                // 计算根节点位置，使其出现在屏幕中心
                const rootPosition = this.calculateCenterPosition();
                
                // MCTS参数
                this.root = new MCTSNode(rootPosition, null, this.baseRadius);
                this.nodes = [this.root];
                this.maxNodes = 300;
                this.maxDepthReached = 0;
                
                // 动画参数
                this.isAnimating = true;
                this.animationSpeed = 1;
                this.lastTime = 0;
                this.stepInterval = 1500;
                this.currentExpandingNode = null;
                
                // 交互参数
                this.isDragging = false;
                this.lastMouseX = 0;
                this.lastMouseY = 0;
                
                this.setupEventListeners();
                this.animate();
            }
            
            // 计算在当前相机角度下会投影到屏幕中心的3D位置
            calculateCenterPosition() {
                // 我们希望这个位置在某个合适的距离上
                const targetDistance = 3.0;
                
                // 反向计算：屏幕中心对应的方向向量
                // 屏幕中心 = (0, 0) 在相机空间
                // 反向应用旋转变换
                let x = 0;
                let y = 0;
                let z = targetDistance;
                
                // 反向X轴旋转
                const cosX = Math.cos(-this.camera.rotationX);
                const sinX = Math.sin(-this.camera.rotationX);
                let tempY = y * cosX - z * sinX;
                z = y * sinX + z * cosX;
                y = tempY;
                
                // 反向Y轴旋转
                const cosY = Math.cos(-this.camera.rotationY);
                const sinY = Math.sin(-this.camera.rotationY);
                let tempX = x * cosY - z * sinY;
                z = x * sinY + z * cosY;
                x = tempX;
                
                return new Vector3(x, y, z);
            }
            
            setupEventListeners() {
                this.canvas.addEventListener('mousedown', (e) => {
                    this.isDragging = true;
                    this.lastMouseX = e.clientX;
                    this.lastMouseY = e.clientY;
                });
                
                this.canvas.addEventListener('mousemove', (e) => {
                    if (this.isDragging) {
                        const deltaX = e.clientX - this.lastMouseX;
                        const deltaY = e.clientY - this.lastMouseY;
                        
                        this.camera.rotationY += deltaX * 0.005;
                        this.camera.rotationX += deltaY * 0.005;
                        
                        this.camera.rotationX = Math.max(0.1, Math.min(Math.PI/2.5, this.camera.rotationX));
                        this.camera.rotationY = this.camera.rotationY % (Math.PI * 2);
                        
                        this.lastMouseX = e.clientX;
                        this.lastMouseY = e.clientY;
                    }
                });
                
                this.canvas.addEventListener('mouseup', () => {
                    this.isDragging = false;
                });
                
                this.canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    this.camera.fov += e.deltaY * 1.5;
                    this.camera.fov = Math.max(300, Math.min(800, this.camera.fov));
                });
            }
            
            getRadiusForDepth(depth) {
                return this.baseRadius + (depth * this.radiusIncrement);
            }
            
            getSpreadRadiusForDepth(depth) {
                return this.baseSpreadRadius + (depth * this.spreadGrowthFactor);
            }
            
            calculateUmbrellaAngle(spreadRadius, sphereRadius) {
                const ratio = Math.min(spreadRadius / sphereRadius, 0.9);
                return Math.asin(ratio);
            }
            
            selectNodeToExpand() {
                if (this.nodes.length >= this.maxNodes) return null;
                
                const leafNodes = this.nodes.filter(node => 
                    node.isLeaf() && 
                    !node.isExpanded && 
                    node.depth < this.maxDepth
                );
                
                if (leafNodes.length === 0) return null;
                
                return leafNodes[Math.floor(Math.random() * leafNodes.length)];
            }
            
            expandNode(node) {
                if (node.isExpanded || node.depth >= this.maxDepth) return;
                
                node.isExpanded = true;
                node.isExpanding = true;
                node.expandStartTime = Date.now();
                this.currentExpandingNode = node;
                
                let numChildren;
                if (node.depth === 0) {
                    numChildren = 12 + Math.floor(Math.random() * 5);
                } else if (node.depth < 3) {
                    numChildren = 10 + Math.floor(Math.random() * 5);
                } else if (node.depth < 5) {
                    numChildren = 10 + Math.floor(Math.random() * 3);
                } else {
                    numChildren = 10 + Math.floor(Math.random() * 2);
                }
                
                const childRadius = this.getRadiusForDepth(node.depth + 1);
                this.maxDepthReached = Math.max(this.maxDepthReached, node.depth + 1);
                
                const targetSpreadRadius = this.getSpreadRadiusForDepth(node.depth + 1);
                const umbrellaAngle = this.calculateUmbrellaAngle(targetSpreadRadius, childRadius);
                
                for (let i = 0; i < numChildren && this.nodes.length < this.maxNodes; i++) {
                    const childPos = this.generateUmbrellaChild(node, i, numChildren, umbrellaAngle, childRadius);
                    const child = new MCTSNode(childPos, node, childRadius);
                    node.addChild(child);
                    this.nodes.push(child);
                }
                
                setTimeout(() => {
                    node.isExpanding = false;
                    if (this.currentExpandingNode === node) {
                        this.currentExpandingNode = null;
                    }
                }, 800);
            }
            
            generateUmbrellaChild(parent, childIndex, totalChildren, umbrellaAngle, targetRadius) {
                const parentDirection = new Vector3(parent.position.x, parent.position.y, parent.position.z).normalize();
                
                let up = new Vector3(0, 0, 1);
                if (Math.abs(parentDirection.dot(up)) > 0.9) {
                    up = new Vector3(1, 0, 0);
                }
                
                const right = parentDirection.cross(up).normalize();
                const forward = parentDirection.cross(right).normalize();
                
                const angleAroundParent = (childIndex / totalChildren) * Math.PI * 2;
                const radiusVariation = 0.9 + (Math.random() * 0.2);
                const radiusInPlane = Math.sin(umbrellaAngle) * radiusVariation;
                
                const localX = Math.cos(angleAroundParent) * radiusInPlane;
                const localY = Math.sin(angleAroundParent) * radiusInPlane;
                const localZ = Math.cos(umbrellaAngle);
                
                const worldDirection = right.multiply(localX)
                    .add(forward.multiply(localY))
                    .add(parentDirection.multiply(localZ))
                    .normalize();
                
                const randomOffset = 0.03;
                const randomDir = new Vector3(
                    (Math.random() - 0.5) * randomOffset,
                    (Math.random() - 0.5) * randomOffset,
                    (Math.random() - 0.5) * randomOffset
                );
                
                const finalDirection = worldDirection.add(randomDir).normalize();
                return finalDirection.multiply(targetRadius);
            }
            
            simulateStep() {
                const selectedNode = this.selectNodeToExpand();
                if (selectedNode) {
                    this.expandNode(selectedNode);
                }
            }
            
            project3D(point) {
                let x = point.x;
                let y = point.y;
                let z = point.z;
                
                // Y轴旋转（左右转向）
                const cosY = Math.cos(this.camera.rotationY);
                const sinY = Math.sin(this.camera.rotationY);
                const tempX = x * cosY - z * sinY;
                z = x * sinY + z * cosY;
                x = tempX;
                
                // X轴旋转（仰望角度）
                const cosX = Math.cos(this.camera.rotationX);
                const sinX = Math.sin(this.camera.rotationX);
                const tempY = y * cosX - z * sinX;
                z = y * sinX + z * cosX;
                y = tempY;
                
                // 距离裁剪
                const distance = Math.sqrt(x * x + y * y + z * z);
                if (distance < this.camera.nearClip || distance > this.camera.farClip) {
                    return null;
                }
                
                // 只显示在相机前方的点（z > 0）
                if (z <= 0) return null;
                
                // 透视投影
                const screenX = this.centerX + (x * this.camera.fov) / z;
                const screenY = this.centerY + (y * this.camera.fov) / z;
                
                // 确保节点在屏幕范围内
                if (screenX < -100 || screenX > this.width + 100 || 
                    screenY < -100 || screenY > this.height + 100) {
                    return null;
                }
                
                return { x: screenX, y: screenY, z: z, distance: distance };
            }
            
            drawConcentricSpheres() {
                // 绘制非常淡的球面参考线
                for (let depth = 1; depth <= this.maxDepthReached; depth++) {
                    const radius = this.getRadiusForDepth(depth);
                    const alpha = Math.max(0.01, 0.05 - depth * 0.008);
                    
                    this.ctx.strokeStyle = `rgba(50, 50, 100, ${alpha})`;
                    this.ctx.lineWidth = 0.2;
                    
                    const segments = 12;
                    
                    // 只绘制几条经线作为参考
                    for (let i = 0; i < segments; i += 3) {
                        const theta = (i / segments) * Math.PI * 2;
                        this.ctx.beginPath();
                        let firstPoint = true;
                        
                        for (let j = 0; j <= segments; j++) {
                            const phi = (j / segments) * Math.PI;
                            const point3D = this.sphericalToCartesian(theta, phi, radius);
                            const point2D = this.project3D(point3D);
                            
                            if (point2D) {
                                if (firstPoint) {
                                    this.ctx.moveTo(point2D.x, point2D.y);
                                    firstPoint = false;
                                } else {
                                    this.ctx.lineTo(point2D.x, point2D.y);
                                }
                            }
                        }
                        this.ctx.stroke();
                    }
                }
            }
            
            sphericalToCartesian(theta, phi, r) {
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);
                return new Vector3(x, y, z);
            }
            
            drawNodes() {
                // 获取所有可见节点并按距离排序
                const projectedNodes = this.nodes.map(node => ({
                    node: node,
                    projected: this.project3D(node.position)
                })).filter(item => item.projected !== null)
                  .sort((a, b) => b.projected.distance - a.projected.distance);
                
                // 绘制连线（很细很细）
                projectedNodes.forEach(({ node, projected }) => {
                    if (node.parent) {
                        const parentProjected = this.project3D(node.parent.position);
                        if (parentProjected) {
                            // 距离越远连线越淡
                            const distanceAlpha = Math.max(0.1, 1 - projected.distance / this.camera.farClip);
                            this.ctx.strokeStyle = `rgba(100, 200, 150, ${distanceAlpha * 0.3})`;
                            this.ctx.lineWidth = 0.3; // 非常细的连线
                            this.ctx.beginPath();
                            this.ctx.moveTo(parentProjected.x, parentProjected.y);
                            this.ctx.lineTo(projected.x, projected.y);
                            this.ctx.stroke();
                        }
                    }
                });
                
                // 绘制节点
                projectedNodes.forEach(({ node, projected }) => {
                    const age = Date.now() - node.creationTime;
                    const maxAge = 25000;
                    const ageRatio = Math.min(age / maxAge, 1);
                    
                    // 距离衰减
                    const distanceRatio = projected.distance / this.camera.farClip;
                    const distanceAlpha = Math.max(0.3, 1 - distanceRatio * 0.7);
                    
                    // 基础大小根据距离调整
                    let baseSize = Math.max(4 - projected.distance * 0.2, 1.0);
                    
                    // 根节点特别突出
                    if (node === this.root) {
                        baseSize *= 2.2;
                    }
                    // 中心节点更大更亮
                    else if (node.isExpanded) {
                        baseSize *= 1.8;
                    }
                    
                    if (node.isExpanding) {
                        const expandTime = Date.now() - node.expandStartTime;
                        const pulsePhase = (expandTime % 500) / 500;
                        baseSize *= (1.8 + Math.sin(pulsePhase * Math.PI * 2) * 0.8);
                    }
                    
                    const size = baseSize;
                    const alpha = Math.max(0.5, (1 - ageRatio * 0.4) * distanceAlpha);
                    
                    // 颜色逻辑
                    let hue, saturation, lightness;
                    
                    if (node === this.root) {
                        // 根节点为特殊的金色
                        hue = 45;
                        saturation = 100;
                        lightness = 70;
                    } else if (node.isExpanded) {
                        // 中心节点为温暖的橙色
                        hue = 25;
                        saturation = 90;
                        lightness = 65;
                    } else if (node.isExpanding) {
                        // 正在扩展的节点为亮橙色
                        hue = 20;
                        saturation = 95;
                        lightness = 75;
                    } else {
                        // 叶子节点：近处绿色，远处蓝白色
                        const depthRatio = Math.min(node.depth / 6, 1);
                        hue = 140 - (depthRatio * 60) + (distanceRatio * 40); // 绿->黄->蓝白
                        saturation = Math.max(30, 80 - (distanceRatio * 30));
                        lightness = 50 + (depthRatio * 20) + (distanceRatio * 20);
                    }
                    
                    // 添加闪烁效果
                    const twinkle = 0.8 + 0.2 * Math.sin(Date.now() * 0.003 + node.creationTime * 0.001);
                    const finalAlpha = alpha * twinkle;
                    
                    this.ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${finalAlpha})`;
                    
                    this.ctx.beginPath();
                    this.ctx.arc(projected.x, projected.y, size, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // 光晕效果
                    if (node === this.root || node.isExpanded || node.isExpanding) {
                        const glowSize = size * 2.5;
                        const glowAlpha = finalAlpha * 0.2;
                        this.ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness + 20}%, ${glowAlpha})`;
                        this.ctx.beginPath();
                        this.ctx.arc(projected.x, projected.y, glowSize, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                });
            }
            
            render() {
                // 清空画布 - 更深的宇宙背景
                this.ctx.fillStyle = 'rgba(0, 0, 5, 0.08)';
                this.ctx.fillRect(0, 0, this.width, this.height);
                
                this.drawConcentricSpheres();
                this.drawNodes();
                
                document.getElementById('nodeCount').textContent = `节点数: ${this.nodes.length}`;
                document.getElementById('layerInfo').textContent = `最大深度: ${this.maxDepthReached}`;
                
                if (this.currentExpandingNode) {
                    document.getElementById('expandingNode').textContent = 
                        `正在绽放: 深度${this.currentExpandingNode.depth}星座 (${this.currentExpandingNode.children.length}颗新星)`;
                } else {
                    document.getElementById('expandingNode').textContent = `仰望星空，等待下一次绽放...`;
                }
            }
            
            animate(currentTime = 0) {
                if (this.isAnimating && currentTime - this.lastTime > this.stepInterval / this.animationSpeed) {
                    this.simulateStep();
                    this.lastTime = currentTime;
                }
                
                this.render();
                requestAnimationFrame((time) => this.animate(time));
            }
            
            reset() {
                const rootPosition = this.calculateCenterPosition();
                this.root = new MCTSNode(rootPosition, null, this.baseRadius);
                this.nodes = [this.root];
                this.maxDepthReached = 0;
                this.currentExpandingNode = null;
            }
            
            toggleAnimation() {
                this.isAnimating = !this.isAnimating;
            }
            
            speedUp() {
                this.animationSpeed = Math.min(this.animationSpeed * 1.5, 10);
            }
            
            slowDown() {
                this.animationSpeed = Math.max(this.animationSpeed / 1.5, 0.1);
            }
        }

        const mctsViz = new StargazingMCTSVisualizer('mctsCanvas');
    </script>
